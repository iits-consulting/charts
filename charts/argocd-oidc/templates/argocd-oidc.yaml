{{- if not .Values.common.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: argocd-oidc
  labels:
    app.kubernetes.io/part-of: argocd
type: Opaque
stringData:
  oidcURL: {{ .Values.oidcURL | quote }}
  clientID: {{ .Values.clientID | quote }}
  clientSecret: {{ .Values.clientSecret | quote }}
{{- end }}