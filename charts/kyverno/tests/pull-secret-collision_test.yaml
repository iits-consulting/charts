suite: pull secret collision detection
templates:
  - policies/add-image-pull-secrets.yaml

tests:
  - it: should fail when ESO secret name collides with a chart-created secret name
    set:
      autoInjectDockerPullSecrets.enabled: true
      autoInjectDockerPullSecrets.secrets:
        dockerhub:
          username: user
          password: pass
          registryUrl: docker.io
      common.externalSecret.pull.secrets:
        pull-secret-dockerhub:
          path: "some/path"
      ingress.host: test.example.com
    asserts:
      - failedTemplate:
          errorMessage: "Helm Fail! Reason: Image Pull Secret pull-secret-dockerhub already exists and would cause Kyverno ClusterPolicy naming conflict."

  - it: should not fail when ESO secret name matches existingSecretRef (intended flow)
    set:
      autoInjectDockerPullSecrets.enabled: true
      autoInjectDockerPullSecrets.existingSecretRef:
        - name: kyverno-pull-secret-dockerhub
          namespace: kyverno
      common.externalSecret.pull.secrets:
        kyverno-pull-secret-dockerhub:
          path: "some/path"
      ingress.host: test.example.com
    asserts:
      - hasDocuments:
          count: 2

  - it: should not fail when all secret names are unique across all three sources
    set:
      autoInjectDockerPullSecrets.enabled: true
      autoInjectDockerPullSecrets.existingSecretRef:
        - name: my-external-secret
          namespace: kyverno
      autoInjectDockerPullSecrets.secrets:
        gitlab:
          username: user
          password: pass
          registryUrl: registry.gitlab.com
      common.externalSecret.pull.secrets:
        my-eso-secret:
          path: "some/path"
      ingress.host: test.example.com
    asserts:
      - hasDocuments:
          count: 4
