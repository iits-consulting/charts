{{- if eq .Values.serviceAccount.create true -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kumoops-dashboard.serviceAccountName" $ }}
  labels:
    {{- include "kumoops-dashboard.labels" $ | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    iits-consulting.chart-creator/version: 1.0.9
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
