serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: { }
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

ingress:
  enabled: true

  # -- Required, replace it with your host address
  host:

  labels:

  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"

  hosts:
    - host: "{{ .Values.ingress.host }}"
      paths:
        - path: "/"
          #pathType: "Prefix"


deployment:
  replicaCount: 1
  onePodForEachNode: false

  imagePullSecrets: [ ]

  annotations:

  resources:
    requests:
      memory: "4Mi"
      cpu: "1m"
    limits:
      memory: "8Mi"
      cpu: "10m"

  podAnnotations: { }

  podSecurityContext:
  # fsGroup: 2000

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsUser: 1001

  #nodeSelector:
  #tolerations:

  extraVolumes: [ ]
  extraVolumeMounts: [ ]

  #affinity:

  containerPort: 3000

  health:
    startupProbe:
      path: "/"
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3

    liveness:
      path: "/"
      initialDelaySeconds: 5
      periodSeconds: 20
      failureThreshold: 3

    readiness:
      path: "/"
      initialDelaySeconds: 5
      periodSeconds: 20
      failureThreshold: 3

service:
  annotations:
  labels:
  type: "ClusterIP"
  port: 80
