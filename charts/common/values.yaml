externalSecret:
  enabled: false

  # -- Labels added to metadata.labels of every rendered resource (generators,
  # pull, push). A resource's own labels win on conflict.
  commonLabels: {}

  # -- Annotations added to metadata.annotations of every rendered resource.
  # A resource's own annotations win on conflict.
  commonAnnotations: {}

  secretStore:
    # Valid values: ClusterSecretStore or SecretStore
    kind: ClusterSecretStore
    name: "vault"
  
  # -- Creates Password generator CRDs. Used with PushSecrets that have generatorRef selectors.
  generators:
    enabled: false
    passwords: {}
      # <name>:
      #   annotations: {} # optional, merged into metadata.annotations
      #   spec:
      #     length: 32
      #     digits: 8
      #     symbols: 0

  # -- Creates a PushSecret resource. It describes what data should be pushed to the SecretStore. This will be created also when pull is set to false.
  push:
    enabled: false
    # -- Defaults merged into every entry under `secrets` (a per-secret value wins).
    # The chart renders the defaults shown below; uncomment to override for all push secrets.
    spec: {}
      # secretStores:              # default: the chart-wide externalSecret.secretStore. Set to push to other stores.
      #   - kind: ClusterSecretStore
      #     name: "MySuperSecretStore"
      #     # labelSelector:
      #     #   matchExpressions: []
      #     #   matchLabels: {}
      # deletionPolicy: Delete      # default: Delete. Valid: Delete, None
      # refreshInterval: 1h         # default: 1h
      # updatePolicy: IfNotExists   # default: IfNotExists. Valid: Replace, IfNotExists
      # conversionStrategy: None    # default: None. Valid: None, ReverseUnicode

    secrets: {}
      # <secret-name>:
      #   path: ""
      #   annotations: {} # optional, merged into metadata.annotations
      #   sourceSecretName: "" # optional, overrides selector.secret.name (default: map key)
      #   generatorRef: # optional, if set uses generatorRef selector instead of secret selector
      #     apiVersion: generators.external-secrets.io/v1alpha1
      #     kind: Password
      #     name: "generator-name"
      #   refreshInterval: 1h # optional, overrides spec-level refreshInterval
      #   deletionPolicy: Delete # optional, overrides spec-level deletionPolicy
      #   updatePolicy: IfNotExists # optional, overrides spec-level updatePolicy
      #   conversionStrategy: None # optional, if not specified, the common from .spec field is used
      #   keys: # list which is afterwards used 1:1 inside the template
      #   - name: accessKey
      #     remoteKey: access_key # optional, if not specified "name" is used
      #   - name: secretKey
      #     remoteKey: secret_key # optional, if not specified "name" is used

  # -- Create ExternalSecret resources. It describes what data should be fetched, how the data should be transformed and saved as a Kind=Secret.
  pull:
    enabled: false
    # -- Defaults merged into every entry under `secrets` (a per-secret value wins).
    # The chart renders the defaults shown below; uncomment to override for all pull secrets.
    spec: {}
      # refreshInterval: 1m          # default: 1m. Valid units: ns, us, ms, s, m, h. "0" fetches once.
      # creationPolicy: Owner        # default: Owner. Valid: Owner, Orphan, Merge, None
      # deletionPolicy: Delete       # default: Delete. Valid: Delete, Merge, Retain
      # conversionStrategy: Default  # default: Default. Valid: Default, Unicode, ReverseUnicode
      # decodingStrategy: None       # default: None. Valid: None, Base64, Base64URL, Auto
      # metadataPolicy: None         # default: None. Valid: None, Fetch
      # refreshPolicy: Periodic      # optional; only rendered when set. Valid: CreatedOnce, Periodic, OnChange

    secrets: {}
      # <secret-name>:
      #   path: "" # required unless using generatorRef
      #   annotations: {} # optional, merged into metadata.annotations
      #   targetName: "" # optional, overrides target Secret name (defaults to map key). Useful when merging into an existing operator-managed Secret with a different name.
      #   creationPolicy: Owner # optional, overrides spec-level creationPolicy
      #   deletionPolicy: Delete # optional, overrides spec-level deletionPolicy
      #   generatorRef: # optional, if set uses dataFrom.sourceRef.generatorRef instead of data[].remoteRef
      #     apiVersion: generators.external-secrets.io/v1alpha1
      #     kind: Password
      #     name: "generator-name"
      #   conversionStrategy: Default # optional, if not specified, the common from .spec field is used
      #   decodingStrategy:  None # optional, if not specified, the common from .spec field is used
      #   metadataPolicy:  None # optional, if not specified, the common from .spec field is used
      #   keys: # list which is afterwards used 1:1 inside the template
      #   - name: accessKey
      #     remoteKey: access_key # optional, if not specified "name" is used
      #   - name: secretKey
      #     remoteKey: secret_key # optional, if not specified "name" is used
      
      # Hardcoded data to be added to the secret
        # template:
        #   data: {}
        #   templateFrom: []
