externalSecret:
  enabled: false
  
  secretStore:
    # Valid values: ClusterSecretStore or SecretStore
    kind: ClusterSecretStore
    name: "vault"
  
  # -- Creates Password generator CRDs. Used with PushSecrets that have generatorRef selectors.
  generators:
    enabled: false
    passwords: {}
      # <name>:
      #   annotations: {} # optional, merged into metadata.annotations
      #   spec:
      #     length: 32
      #     digits: 8
      #     symbols: 0

  # -- Creates a PushSecret resource. It describes what data should be pushed to the SecretStore. This will be created also when pull is set to false.
  push:
    enabled: false
    spec:
      # If set, .externalSecrets.secretStore will be ignored
      secretStores: []
      # - kind: ClusterSecretStore
      #   name: "MySuperSecretStore"
      #   # labelSelector: ...
      #   #  matchExpressions: []
      #   #  matchLabels: {}

      # Deletion Policy to handle Secrets in the provider
      # Valid values: Delete, None
      deletionPolicy: Delete

      # The Interval to which External Secrets will try to push a secret definition
      refreshInterval: 1h

      # UpdatePolicy to handle Secrets in the provider
      # Valid values: Replace, IfNotExists
      updatePolicy: IfNotExists

      # Strategy for converting secret key names before matching and rewriting. Can be Default, Unicode or ReverseUnicode. Defaults to Default
      conversionStrategy: Default
      
      # Set the following Decoding Strategies based on the need. Can be None, Base64, Base64URL or Auto. Defaults to None
      decodingStrategy: None
      
      # Policy for fetching tags/labels from provider secrets, possible options are Fetch, None. Defaults to None
      metadataPolicy: None

    secrets: {}
      # <secret-name>:
      #   path: ""
      #   annotations: {} # optional, merged into metadata.annotations
      #   sourceSecretName: "" # optional, overrides selector.secret.name (default: map key)
      #   generatorRef: # optional, if set uses generatorRef selector instead of secret selector
      #     apiVersion: generators.external-secrets.io/v1alpha1
      #     kind: Password
      #     name: "generator-name"
      #   refreshInterval: 1h # optional, overrides spec-level refreshInterval
      #   deletionPolicy: Delete # optional, overrides spec-level deletionPolicy
      #   updatePolicy: IfNotExists # optional, overrides spec-level updatePolicy
      #   conversionStrategy: Default # optional, if not specified, the common from .spec field is used
      #   decodingStrategy:  None # optional, if not specified, the common from .spec field is used
      #   metadataPolicy:  None # optional, if not specified, the common from .spec field is used
      #   keys: # list which is afterwards used 1:1 inside the template
      #   - name: accessKey
      #     remoteKey: access_key # optional, if not specified "name" is used
      #   - name: secretKey
      #     remoteKey: secret_key # optional, if not specified "name" is used

  # -- Create ExternalSecret resources. It describes what data should be fetched, how the data should be transformed and saved as a Kind=Secret.
  pull:
    enabled: false
    spec:
      # RefreshInterval is the amount of time before the values are read again from the SecretStore provider
      # Valid time units are "ns", "us" (or "µs"), "ms", "s", "m", "h"
      # Example values: "1h", "2h30m", "10s"
      # May be set to zero to fetch and create it once
      refreshInterval: 1m

      # CreationPolicy defines rules on how to create the resulting Secret.
      # Owner, Orphan, Merge, None
      creationPolicy: Owner

      # DeletionPolicy defines rules on how to delete the resulting Secret
      # Valid values: Delete, Merge, Retain
      deletionPolicy: Delete

      # Strategy for converting secret key names before matching and rewriting. Can be Default, Unicode or ReverseUnicode. Defaults to Default
      conversionStrategy: Default
      
      # Set the following Decoding Strategies based on the need. Can be None, Base64, Base64URL or Auto. Defaults to None
      decodingStrategy: None
      
      # Policy for fetching tags/labels from provider secrets, possible options are Fetch, None. Defaults to None
      metadataPolicy: None
    
    

    secrets: {}
      # <secret-name>:
      #   path: "" # required unless using generatorRef
      #   annotations: {} # optional, merged into metadata.annotations
      #   targetName: "" # optional, overrides target Secret name (defaults to map key). Useful when merging into an existing operator-managed Secret with a different name.
      #   creationPolicy: Owner # optional, overrides spec-level creationPolicy
      #   deletionPolicy: Delete # optional, overrides spec-level deletionPolicy
      #   generatorRef: # optional, if set uses dataFrom.sourceRef.generatorRef instead of data[].remoteRef
      #     apiVersion: generators.external-secrets.io/v1alpha1
      #     kind: Password
      #     name: "generator-name"
      #   conversionStrategy: Default # optional, if not specified, the common from .spec field is used
      #   decodingStrategy:  None # optional, if not specified, the common from .spec field is used
      #   metadataPolicy:  None # optional, if not specified, the common from .spec field is used
      #   keys: # list which is afterwards used 1:1 inside the template
      #   - name: accessKey
      #     remoteKey: access_key # optional, if not specified "name" is used
      #   - name: secretKey
      #     remoteKey: secret_key # optional, if not specified "name" is used
      
      # Hardcoded data to be added to the secret
        # template:
        #   data: {}
        #   templateFrom: []
