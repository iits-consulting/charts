suite: Password Generator
templates:
  - external-secrets/password-generator.yaml

tests:
  - it: should create a Password generator
    set:
      externalSecret.enabled: true
      externalSecret.generators.enabled: true
      externalSecret.generators.passwords:
        my-password:
          spec:
            length: 32
            digits: 8
            symbols: 0
    asserts:
      - isKind:
          of: Password
      - isAPIVersion:
          of: generators.external-secrets.io/v1alpha1
      - equal:
          path: metadata.name
          value: my-password
      - notExists:
          path: metadata.annotations
      - equal:
          path: spec
          value:
            length: 32
            digits: 8
            symbols: 0

  - it: should merge annotations when specified
    set:
      externalSecret.enabled: true
      externalSecret.generators.enabled: true
      externalSecret.generators.passwords:
        annotated-gen:
          annotations:
            argocd.argoproj.io/sync-wave: "11"
          spec:
            length: 16
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "11"

  - it: should create multiple Password generators
    set:
      externalSecret.enabled: true
      externalSecret.generators.enabled: true
      externalSecret.generators.passwords:
        gen-one:
          spec:
            length: 16
            digits: 4
            symbols: 0
        gen-two:
          spec:
            length: 64
            digits: 16
            symbols: 4
    asserts:
      - hasDocuments:
          count: 2

  - it: should not create generators when generators.enabled is false
    set:
      externalSecret.enabled: true
      externalSecret.generators.enabled: false
      externalSecret.generators.passwords:
        my-password:
          spec:
            length: 32
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create generators when externalSecret is disabled
    set:
      externalSecret.enabled: false
      externalSecret.generators.enabled: true
      externalSecret.generators.passwords:
        my-password:
          spec:
            length: 32
    asserts:
      - hasDocuments:
          count: 0

  - it: should merge commonLabels/commonAnnotations with per-resource winning
    set:
      externalSecret.enabled: true
      externalSecret.generators.enabled: true
      externalSecret.commonLabels:
        tier: common
        owner: platform
      externalSecret.commonAnnotations:
        team: sec
      externalSecret.generators.passwords:
        my-password:
          labels:
            tier: generator
          spec:
            length: 32
    asserts:
      - equal:
          path: metadata.labels.owner
          value: platform
      - equal:
          path: metadata.labels.tier
          value: generator
      - equal:
          path: metadata.annotations.team
          value: sec

  - it: should render namespace and finalizers when specified
    set:
      externalSecret.enabled: true
      externalSecret.generators.enabled: true
      externalSecret.generators.passwords:
        my-password:
          namespace: foo
          finalizers:
            - external-secrets.io/finalizer
          spec:
            length: 32
    asserts:
      - equal:
          path: metadata.namespace
          value: foo
      - equal:
          path: metadata.finalizers
          value:
            - external-secrets.io/finalizer
