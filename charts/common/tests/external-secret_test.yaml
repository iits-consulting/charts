suite: ExternalSecret
templates:
  - external-secret.yaml

tests:
  - it: should create an ExternalSecret with two keys
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: accessKey
              remoteKey: access_key
            - name: secretKey
              remoteKey: secret_key
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: test
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "13"
      - equal:
          path: spec.target.name
          value: test
      - equal:
          path: spec.data
          value:
            - secretKey: "accessKey"
              remoteRef:
                key: "test/path"
                property: "access_key"
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None
            - secretKey: "secretKey"
              remoteRef:
                key: "test/path"
                property: "secret_key"
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None

  - it: should use targetName override when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        my-external-secret:
          targetName: my-actual-secret
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.name
          value: my-external-secret
      - equal:
          path: spec.target.name
          value: my-actual-secret

  - it: should allow per-secret creationPolicy and deletionPolicy overrides
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        merge-secret:
          targetName: existing-secret
          creationPolicy: Merge
          deletionPolicy: Retain
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.target.creationPolicy
          value: Merge
      - equal:
          path: spec.target.deletionPolicy
          value: Retain

  - it: should use generatorRef via dataFrom when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        generated-secret:
          generatorRef:
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: Password
            name: my-password-gen
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.dataFrom[0].sourceRef.generatorRef.kind
          value: Password
      - equal:
          path: spec.dataFrom[0].sourceRef.generatorRef.name
          value: my-password-gen
      - isNull:
          path: spec.data

  - it: should use remoteKey default to name when remoteKey not specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: myKey
    asserts:
      - equal:
          path: spec.data[0].remoteRef.property
          value: "myKey"

  - it: should add hardcoded values to the secret when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        template:
          data:
            test: "test-value"
    asserts:
      - equal:
          path: spec.data
          value:
            - test: "test-value"