suite: ExternalSecret
templates:
  - external-secret.yaml

tests:
  - it: should create an ExternalSecret with two keys
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: accessKey
              remoteKey: access_key
            - name: secretKey
              remoteKey: secret_key
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: test
      - isNull:
          path: metadata.annotations
      - equal:
          path: spec.target.name
          value: test
      - equal:
          path: spec.data
          value:
            - secretKey: "accessKey"
              remoteRef:
                key: "test/path"
                property: "access_key"
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None
            - secretKey: "secretKey"
              remoteRef:
                key: "test/path"
                property: "secret_key"
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None

  - it: should use targetName override when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        my-external-secret:
          targetName: my-actual-secret
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.name
          value: my-external-secret
      - equal:
          path: spec.target.name
          value: my-actual-secret

  - it: should allow per-secret creationPolicy and deletionPolicy overrides
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        merge-secret:
          targetName: existing-secret
          creationPolicy: Merge
          deletionPolicy: Retain
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.target.creationPolicy
          value: Merge
      - equal:
          path: spec.target.deletionPolicy
          value: Retain

  - it: should use generatorRef via dataFrom when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        generated-secret:
          generatorRef:
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: Password
            name: my-password-gen
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.dataFrom[0].sourceRef.generatorRef.kind
          value: Password
      - equal:
          path: spec.dataFrom[0].sourceRef.generatorRef.name
          value: my-password-gen
      - isNull:
          path: spec.data

  - it: should merge annotations when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        annotated:
          path: "test/path"
          annotations:
            argocd.argoproj.io/sync-wave: "13"
            custom.io/foo: "bar"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "13"
      - equal:
          path: metadata.annotations["custom.io/foo"]
          value: "bar"

  - it: should not render annotations key when annotations is empty map
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        no-annotations:
          path: "test/path"
          annotations: {}
          keys:
            - name: password
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should use remoteKey default to name when remoteKey not specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: myKey
    asserts:
      - equal:
          path: spec.data[0].remoteRef.property
          value: "myKey"

  - it: should add hardcoded values to the secret when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            data:
              test-key: "test-value"
    asserts:
      - equal:
          path: spec.target.template.data
          value:
            test-key: "test-value"
  
  - it: should add templateFrom with configMap only when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            templateFrom:
            - configMap:
                name: my-configmap
                items:
                  - key: some-key
    asserts:
      - equal:
          path: spec.target.template.templateFrom
          value:
          - configMap:
              name: my-configmap
              items:
                - key: some-key

  - it: should add templateFrom with secret only when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            templateFrom:
              - secret:
                  name: my-secret
                  items:
                    - key: some-key
    asserts:
      - equal:
          path: spec.target.template.templateFrom
          value:
            - secret:
                name: my-secret
                items:
                  - key: some-key
  
  - it: should add templateFrom with both configMap and secret when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            templateFrom:
              - configMap:
                  name: my-configmap
                  items:
                    - key: some-key
              - secret:
                  name: my-secret
                  items:
                    - key: some-key
    asserts:
      - equal:
          path: spec.target.template.templateFrom
          value:
            - configMap:
                name: my-configmap
                items:
                  - key: some-key
            - secret:
                name: my-secret
                items:
                  - key: some-key