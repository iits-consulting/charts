suite: test externalSecret
templates:
  - external-secret.yaml
tests:
  - it: should create an externalSecret object with two keys
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test"
          keys:
          - name: accessKey
            remoteKey: access_key
          - name: secretKey
            remoteKey: secret_key

    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: test
      - equal:
          path: spec.data
          value: [{secretKey: "accessKey", remoteRef: {key: "test", property: "access_key", conversionStrategy: Default, decodingStrategy: None, metadataPolicy: None}}, {secretKey: "secretKey", remoteRef: {key: "test", property: "secret_key", conversionStrategy: Default, decodingStrategy: None, metadataPolicy: None}}]
