suite: ExternalSecret
templates:
  - external-secrets/external-secret.yaml

tests:
  - it: should create an ExternalSecret with two keys
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: accessKey
              remoteKey: access_key
            - name: secretKey
              remoteKey: secret_key
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: test
      - notExists:
          path: metadata.annotations
      - equal:
          path: spec.target.name
          value: test
      - equal:
          path: spec.data
          value:
            - secretKey: "accessKey"
              remoteRef:
                key: "test/path"
                property: "access_key"
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None
            - secretKey: "secretKey"
              remoteRef:
                key: "test/path"
                property: "secret_key"
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None

  - it: should use targetName override when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        my-external-secret:
          targetName: my-actual-secret
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.name
          value: my-external-secret
      - equal:
          path: spec.target.name
          value: my-actual-secret

  - it: should allow per-secret creationPolicy and deletionPolicy overrides
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        merge-secret:
          targetName: existing-secret
          creationPolicy: Merge
          deletionPolicy: Retain
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.target.creationPolicy
          value: Merge
      - equal:
          path: spec.target.deletionPolicy
          value: Retain

  - it: should use generatorRef via dataFrom when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        generated-secret:
          generatorRef:
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: Password
            name: my-password-gen
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.dataFrom[0].sourceRef.generatorRef.kind
          value: Password
      - equal:
          path: spec.dataFrom[0].sourceRef.generatorRef.name
          value: my-password-gen
      - notExists:
          path: spec.data

  - it: should merge annotations when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        annotated:
          path: "test/path"
          annotations:
            argocd.argoproj.io/sync-wave: "13"
            custom.io/foo: "bar"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "13"
      - equal:
          path: metadata.annotations["custom.io/foo"]
          value: "bar"

  - it: should not render annotations key when annotations is empty map
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        no-annotations:
          path: "test/path"
          annotations: {}
          keys:
            - name: password
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should use remoteKey default to name when remoteKey not specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: myKey
    asserts:
      - equal:
          path: spec.data[0].remoteRef.property
          value: "myKey"

  - it: should add hardcoded values to the secret when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            data:
              test-key: "test-value"
    asserts:
      - equal:
          path: spec.target.template.data
          value:
            test-key: "test-value"
  
  - it: should add templateFrom with configMap only when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            templateFrom:
            - configMap:
                name: my-configmap
                items:
                  - key: some-key
    asserts:
      - equal:
          path: spec.target.template.templateFrom
          value:
          - configMap:
              name: my-configmap
              items:
                - key: some-key

  - it: should add templateFrom with secret only when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            templateFrom:
              - secret:
                  name: my-secret
                  items:
                    - key: some-key
    asserts:
      - equal:
          path: spec.target.template.templateFrom
          value:
            - secret:
                name: my-secret
                items:
                  - key: some-key
  
  - it: should add templateFrom with both configMap and secret when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            templateFrom:
              - configMap:
                  name: my-configmap
                  items:
                    - key: some-key
              - secret:
                  name: my-secret
                  items:
                    - key: some-key
    asserts:
      - equal:
          path: spec.target.template.templateFrom
          value:
            - configMap:
                name: my-configmap
                items:
                  - key: some-key
            - secret:
                name: my-secret
                items:
                  - key: some-key
  - it: should default template type to Opaque when not specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            data:
              some-key: "some-value"
    asserts:
      - equal:
          path: spec.target.template.type
          value: Opaque

  - it: should use custom template type when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            type: "kubernetes.io/tls"
            data:
              tls.crt: "{{ .cert }}"
              tls.key: "{{ .key }}"
    asserts:
      - equal:
          path: spec.target.template.type
          value: "kubernetes.io/tls"

  - it: should not render template block when template is not configured
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: myKey
    asserts:
      - notExists:
          path: spec.target.template

  - it: should merge commonLabels/commonAnnotations and namespace, per-resource winning
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.commonLabels:
        tier: common
        owner: platform
      externalSecret.commonAnnotations:
        team: sec
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          namespace: foo
          labels:
            tier: secret
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.namespace
          value: foo
      - equal:
          path: metadata.labels.owner
          value: platform
      - equal:
          path: metadata.labels.tier
          value: secret
      - equal:
          path: metadata.annotations.team
          value: sec

  - it: should inject the chart-wide secretStore default into secretStoreRef
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.secretStoreRef.name
          value: vault

  - it: should let a per-secret secretStoreRef override the chart-wide default
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.secretStore:
        kind: ClusterSecretStore
        name: vault
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          secretStoreRef:
            kind: SecretStore
            name: per-secret-store
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore
      - equal:
          path: spec.secretStoreRef.name
          value: per-secret-store

  - it: should fail with a clear message when no secretStore is resolvable
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.secretStore: null
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: password
    asserts:
      - failedTemplate:
          errorMessage: "secretStoreRef is required: set externalSecret.secretStore or a per-secret secretStoreRef"

  - it: should fail when path is missing and no generatorRef is set
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          keys:
            - name: password
    asserts:
      - failedTemplate:
          errorMessage: "Path to pull secret is required"

  - it: should apply spec-level defaults to every secret, per-secret winning
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.spec:
        refreshInterval: 2h
        creationPolicy: Orphan
        deletionPolicy: Retain
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          deletionPolicy: Merge
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 2h
      - equal:
          path: spec.target.creationPolicy
          value: Orphan
      - equal:
          path: spec.target.deletionPolicy
          value: Merge

  - it: should default refreshInterval to 1m when unset
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 1m

  - it: should default conversionStrategy, decodingStrategy and metadataPolicy and allow per-secret overrides
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          conversionStrategy: Unicode
          decodingStrategy: Base64
          metadataPolicy: Fetch
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.data[0].remoteRef.conversionStrategy
          value: Unicode
      - equal:
          path: spec.data[0].remoteRef.decodingStrategy
          value: Base64
      - equal:
          path: spec.data[0].remoteRef.metadataPolicy
          value: Fetch

  - it: should only render refreshPolicy and nullBytePolicy when set
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          refreshPolicy: OnChange
          nullBytePolicy: Ignore
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.refreshPolicy
          value: OnChange
      - equal:
          path: spec.data[0].remoteRef.nullBytePolicy
          value: Ignore

  - it: should not render refreshPolicy or nullBytePolicy by default
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          keys:
            - name: password
    asserts:
      - notExists:
          path: spec.refreshPolicy
      - notExists:
          path: spec.data[0].remoteRef.nullBytePolicy

  - it: should default template engineVersion to v2 and render template metadata
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          template:
            metadata:
              labels:
                app: my-app
            data:
              some-key: "some-value"
    asserts:
      - equal:
          path: spec.target.template.engineVersion
          value: v2
      - equal:
          path: spec.target.template.metadata.labels.app
          value: my-app

  - it: should render finalizers when specified
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test/path"
          finalizers:
            - external-secrets.io/finalizer
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.finalizers
          value:
            - external-secrets.io/finalizer

  - it: should render one document per secret
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        alpha:
          path: "alpha/path"
          keys:
            - name: password
        bravo:
          path: "bravo/path"
          keys:
            - name: password
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ExternalSecret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: alpha
        documentIndex: 0
      - equal:
          path: metadata.name
          value: bravo
        documentIndex: 1
