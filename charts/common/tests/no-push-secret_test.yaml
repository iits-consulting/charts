suite: test externalSecret
templates:
  - push-secret.yaml
tests:
  - it: should not create a pushSecret object
    set:
      externalSecret.enabled: true
      externalSecret.pull.enabled: true
      externalSecret.pull.secrets:
        test:
          path: "test"
          keys:
          - name: accessKey
            remoteKey: access_key

    asserts:
      - hasDocuments:
          count: 0
