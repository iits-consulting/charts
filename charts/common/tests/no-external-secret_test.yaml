suite: test externalSecret
templates:
  - external-secret.yaml
tests:
  - it: should not create an ExternalSecret object
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          path: "test"
          keys:
          - name: accessKey
            remoteKey: access_key

    asserts:
      - hasDocuments:
          count: 0
