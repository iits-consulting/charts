suite: PushSecret
templates:
  - push-secret.yaml

tests:
  - it: should create a PushSecret with two keys
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          path: "test/path"
          keys:
            - name: accessKey
              remoteKey: access_key
            - name: secretKey
              remoteKey: secret_key
    asserts:
      - isKind:
          of: PushSecret
      - equal:
          path: metadata.name
          value: test
      - isNull:
          path: metadata.annotations
      - equal:
          path: spec.selector.secret.name
          value: test
      - equal:
          path: spec.data
          value:
            - conversionStrategy: None
              match:
                secretKey: "accessKey"
                remoteRef:
                  remoteKey: "test/path"
                  property: "access_key"
            - conversionStrategy: None
              match:
                secretKey: "secretKey"
                remoteRef:
                  remoteKey: "test/path"
                  property: "secret_key"

  - it: should use generatorRef selector when specified
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        gen-push:
          generatorRef:
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: Password
            name: my-gen
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.selector.generatorRef.kind
          value: Password
      - equal:
          path: spec.selector.generatorRef.name
          value: my-gen
      - isNull:
          path: spec.selector.secret

  - it: should use sourceSecretName override when specified
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        my-push:
          sourceSecretName: actual-k8s-secret
          path: "test/path"
          keys:
            - name: username
    asserts:
      - equal:
          path: spec.selector.secret.name
          value: actual-k8s-secret

  - it: should allow per-secret refreshInterval, deletionPolicy, updatePolicy overrides
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        override-push:
          refreshInterval: 30m
          deletionPolicy: None
          updatePolicy: Replace
          path: "test/path"
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 30m
      - equal:
          path: spec.deletionPolicy
          value: None
      - equal:
          path: spec.updatePolicy
          value: Replace

  - it: should merge annotations when specified
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        annotated:
          path: "test/path"
          annotations:
            argocd.argoproj.io/sync-wave: "12"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "12"

  - it: should fall back to spec-level defaults when no per-secret overrides
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        default-push:
          path: "test/path"
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 1h
      - equal:
          path: spec.deletionPolicy
          value: Delete
      - equal:
          path: spec.updatePolicy
          value: IfNotExists
