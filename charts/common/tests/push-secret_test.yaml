suite: test externalSecret
templates:
  - push-secret.yaml
tests:
  - it: should create an externalSecret object with two keys
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          path: "test"
          keys:
          - name: accessKey
            remoteKey: access_key
          - name: secretKey
            remoteKey: secret_key

    asserts:
      - isKind:
          of: PushSecret
      - equal:
          path: metadata.name
          value: test
      - equal:
          path: spec.data
          value: [{match: {secretKey: "accessKey", remoteRef: {remoteKey: "test", property: "access_key", conversionStrategy: Default, decodingStrategy: None, metadataPolicy: None}}}, {match: {secretKey: "secretKey", remoteRef: {remoteKey: "test", property: "secret_key", conversionStrategy: Default, decodingStrategy: None, metadataPolicy: None}}}]
