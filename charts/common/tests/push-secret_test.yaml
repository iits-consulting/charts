suite: PushSecret
templates:
  - external-secrets/push-secret.yaml

tests:
  - it: should create a PushSecret with two keys
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          path: "test/path"
          keys:
            - name: accessKey
              remoteKey: access_key
            - name: secretKey
              remoteKey: secret_key
    asserts:
      - isKind:
          of: PushSecret
      - equal:
          path: metadata.name
          value: test
      - notExists:
          path: metadata.annotations
      - equal:
          path: spec.selector.secret.name
          value: test
      - equal:
          path: spec.data
          value:
            - conversionStrategy: None
              match:
                secretKey: "accessKey"
                remoteRef:
                  remoteKey: "test/path"
                  property: "access_key"
            - conversionStrategy: None
              match:
                secretKey: "secretKey"
                remoteRef:
                  remoteKey: "test/path"
                  property: "secret_key"

  - it: should use generatorRef selector when specified
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        gen-push:
          generatorRef:
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: Password
            name: my-gen
          path: "test/path"
          keys:
            - name: password
    asserts:
      - equal:
          path: spec.selector.generatorRef.kind
          value: Password
      - equal:
          path: spec.selector.generatorRef.name
          value: my-gen
      - notExists:
          path: spec.selector.secret

  - it: should use sourceSecretName override when specified
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        my-push:
          sourceSecretName: actual-k8s-secret
          path: "test/path"
          keys:
            - name: username
    asserts:
      - equal:
          path: spec.selector.secret.name
          value: actual-k8s-secret

  - it: should allow per-secret refreshInterval, deletionPolicy, updatePolicy overrides
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        override-push:
          refreshInterval: 30m
          deletionPolicy: None
          updatePolicy: Replace
          path: "test/path"
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 30m
      - equal:
          path: spec.deletionPolicy
          value: None
      - equal:
          path: spec.updatePolicy
          value: Replace

  - it: should merge annotations when specified
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        annotated:
          path: "test/path"
          annotations:
            argocd.argoproj.io/sync-wave: "12"
          keys:
            - name: password
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "12"

  - it: should fall back to chart defaults when no per-secret or spec overrides
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        default-push:
          path: "test/path"
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 1h
      - equal:
          path: spec.deletionPolicy
          value: Delete
      - equal:
          path: spec.updatePolicy
          value: IfNotExists

  - it: should inject the chart-wide secretStore default into secretStoreRefs as a list
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          path: "test/path"
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.secretStoreRefs
          value:
            - kind: ClusterSecretStore
              name: vault

  - it: should let a per-secret secretStores override the chart-wide default
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          path: "test/path"
          secretStores:
            - kind: SecretStore
              name: store-a
            - kind: ClusterSecretStore
              name: store-b
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.secretStoreRefs
          value:
            - kind: SecretStore
              name: store-a
            - kind: ClusterSecretStore
              name: store-b

  - it: should apply spec-level defaults to every secret, per-secret winning
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.spec:
        refreshInterval: 6h
        deletionPolicy: None
        conversionStrategy: ReverseUnicode
      externalSecret.push.secrets:
        test:
          path: "test/path"
          deletionPolicy: Delete
          keys:
            - name: key1
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 6h
      - equal:
          path: spec.deletionPolicy
          value: Delete
      - equal:
          path: spec.data[0].conversionStrategy
          value: ReverseUnicode

  - it: should fail with a clear message when no secretStores is resolvable
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.secretStore: null
      externalSecret.push.secrets:
        test:
          path: "test/path"
          keys:
            - name: key1
    asserts:
      - failedTemplate:
          errorMessage: "secretStores is required: set externalSecret.secretStore or a per-secret secretStores"

  - it: should fail when path is missing
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        test:
          keys:
            - name: key1
    asserts:
      - failedTemplate:
          errorMessage: "Path to push secret is required"

  - it: should merge commonLabels/commonAnnotations and render namespace and finalizers
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.commonLabels:
        tier: common
        owner: platform
      externalSecret.commonAnnotations:
        team: sec
      externalSecret.push.secrets:
        test:
          path: "test/path"
          namespace: foo
          labels:
            tier: secret
          finalizers:
            - external-secrets.io/finalizer
          keys:
            - name: key1
    asserts:
      - equal:
          path: metadata.namespace
          value: foo
      - equal:
          path: metadata.labels.owner
          value: platform
      - equal:
          path: metadata.labels.tier
          value: secret
      - equal:
          path: metadata.annotations.team
          value: sec
      - equal:
          path: metadata.finalizers
          value:
            - external-secrets.io/finalizer

  - it: should render one document per secret
    set:
      externalSecret.enabled: true
      externalSecret.push.enabled: true
      externalSecret.push.secrets:
        alpha:
          path: "alpha/path"
          keys:
            - name: key1
        bravo:
          path: "bravo/path"
          keys:
            - name: key1
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: alpha
        documentIndex: 0
      - equal:
          path: metadata.name
          value: bravo
        documentIndex: 1
