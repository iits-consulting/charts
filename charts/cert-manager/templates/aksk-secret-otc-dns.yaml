{{ if and (eq .Values.clusterIssuers.otcDNS.enabled true) (eq .Values.clusterIssuers.otcDNS.existingSecretRef "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-otc-dns-creds
stringData:
  access_key: {{ .Values.clusterIssuers.otcDNS.access_key | quote }}
  secret_key: {{ .Values.clusterIssuers.otcDNS.secret_key | quote }}
---
{{- end }}
