{{ if and (eq .Values.clusterIssuers.otcDNS.enabled true) (eq .Values.clusterIssuers.otcDNS.existingSecretRef "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-otc-dns-creds
stringData:
  accessKey: {{ .Values.clusterIssuers.otcDNS.accessKey | quote }}
  secretKey: {{ .Values.clusterIssuers.otcDNS.secretKey | quote }}
---
{{- with .Values.externalSecret }}
{{- if and .enabled .push.enabled (not .pull.enabled) }}
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ $.Release.Name }}-otc-dns-creds
spec:
  selector:
    secret:
      name: {{ $.Release.Name }}-otc-dns-creds
  {{- with .push.spec.refreshInterval }}
  refreshInterval: {{ . }}
  {{- end }}
  {{- with .push.spec.deletionPolicy }}
  deletionPolicy: {{ . }}
  {{- end }}
  {{- with .push.spec.updatePolicy }}
  updatePolicy: {{ . }}
  {{- end }}
  secretStoreRefs:
  {{- if .push.secretStores }}
    {{ range $secretStore := .push.secretStores }}
    - {{ $secretStore | toYaml | nindent 6 }}
    {{- end }}
  {{- else }}
    {{- with $.Values.externalSecret.secretStore }}
    - {{ toYaml . | nindent 6 | trim }}
    {{- end }} 
  {{- end }} 
  data:
  {{- $path := .push.remoteRef.path }}
  {{- range .push.remoteRef.keys }}
  - match:
      secretKey: {{ . }}
      remoteRef:
        remoteKey: {{ $path }}
        property: {{ . }}
  {{- end }}
{{- end }}
{{- if and .enabled .pull.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $.Release.Name }}-secrets
spec:
  refreshInterval: {{ .refreshInterval }}
  target:
    name: {{ $.Release.Name }}-secrets
    creationPolicy: {{ .pull.spec.creationPolicy }}
    deletionPolicy: {{ .pull.spec.deletionPolicy }}
  secretStoreRef:
  {{- with $.Values.externalSecret.secretStore }}
    {{ toYaml . | nindent 4 | trim }}
  {{- end }}
  data:
  {{- range $property, $values := .pull.paths }}
    - secretKey: {{ $property | quote }}
      remoteRef:
        key: {{ $values.path | quote }}
        property: {{ $values.key | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
