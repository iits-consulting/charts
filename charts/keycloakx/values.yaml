keycloakx:
  # do not define, if ExternalSecret (ESO) is in use.
  # secretEnv:
  #   KC_BOOTSTRAP_ADMIN_USERNAME: "keycloakAdmin"
  #   KC_BOOTSTRAP_ADMIN_PASSWORD: "REPLACE_ME"

  configMapEnv:
    JAVA_OPTS_APPEND: "-Djgroups.dns.query=keycloakx-headless"
    KC_LOG_LEVEL_ORG_KEYCLOAK_EVENTS: "trace"
    KC_LOG_CONSOLE_LEVEL: "trace"
    KC_LOG_CONSOLE_OUTPUT: "json"

  database:
    vendor: "postgres"
    # do not define, if ExternalSecret (ESO) is in use.
    # hostname: "REPLACE_ME"
    # port: "REPLACE_ME"
    # database: "REPLACE_ME"
    # username: "REPLACE_ME"
    # password: "REPLACE_ME"

  extraEnvFrom: |
    # If secrets below are generated by ExternalSecrets, ensure that name value below matches the relevant key defined in `common.externalSecret.pull.secrets.<secret-name>`
    - secretRef:
        name: {{ include "keycloak.fullname" $ }}-env
    # Dedicated secretRef for DB credentials when using External Secrets.
    - secretRef:
        name: {{ include "keycloak.fullname" $ }}-database
    - configMapRef:
        name: {{ include "keycloak.fullname" $ }}-env

  replicas: 2
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "start"
    - "--http-port=8080"
    - "--hostname-strict=false"

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      "traefik.ingress.kubernetes.io/router.entrypoints": websecure
    rules:
      - host: "REPLACE_ME"
        paths:
          - path: "/"
            pathType: Prefix

  http:
    relativePath: "/"
  proxy:
    mode: "xforwarded"

  resources:
    requests:
      cpu: "100m"
      memory: "718Mi"
    limits:
      memory: "718Mi"

  topologySpreadConstraints: |
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: "DoNotSchedule"

  serviceMonitor:
    enabled: true

# https://github.com/iits-consulting/charts/tree/main/charts/common
# Global functionality can be used from the common library chart, e.g. creating External Secrets
common:
  externalSecret:
    enabled: true
    pull:
      enabled: true
      secrets:
        keycloakx-eso-env:
          path: "{{ .Values.projectValues.context }}/data/infra/keycloak/keycloak_admin_credentials"
          keys:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              remoteKey: username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              remoteKey: password
        keycloakx-eso-database:
          path: "{{ .Values.projectValues.context }}/data/infra/keycloak/keycloak_database_credentials"
          keys:
            - name: KC_DB_URL_HOST
              remoteKey: address
            - name: KC_DB_URL_PORT
              remoteKey: port
            - name: KC_DB_URL_DATABASE
              remoteKey: keycloak_dbName
            - name: KC_DB_USERNAME
              remoteKey: keycloak_username
            - name: KC_DB_PASSWORD
              remoteKey: keycloak_password
