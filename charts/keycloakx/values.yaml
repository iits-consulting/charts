keycloakx:
  secretEnv:
    KC_BOOTSTRAP_ADMIN_USERNAME: "keycloakAdmin"
    KC_BOOTSTRAP_ADMIN_PASSWORD: "REPLACE_ME"

  configMapEnv:
    JAVA_OPTS_APPEND: "-Djgroups.dns.query=keycloakx-headless"
    KC_LOG_LEVEL_ORG_KEYCLOAK_EVENTS: "trace"
    KC_LOG_CONSOLE_LEVEL: "trace"
    KC_LOG_CONSOLE_OUTPUT: "json"

  database:
    vendor: ""
    hostname: ""
    port: ""
    database: ""
    username: ""
    password: ""

  extraEnvFrom: |
    - secretRef:
        name: {{ include "keycloak.fullname" $ }}-env
    - configMapRef:
        name: {{ include "keycloak.fullname" $ }}-env

  replicas: 2
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "start"
    - "--http-port=8080"
    - "--hostname-strict=false"

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      "traefik.ingress.kubernetes.io/router.entrypoints": websecure
    rules:
      - host: "REPLACE_ME"
        paths:
          - path: "/"
            pathType: Prefix

  http:
    relativePath: "/"
  proxy:
    mode: "xforwarded"

  resources:
    requests:
      cpu: "100m"
      memory: "718Mi"
    limits:
      memory: "718Mi"

  topologySpreadConstraints: |
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: "DoNotSchedule"

  serviceMonitor:
    enabled: true

postgresOperator:
  enabled: false
  # Default annotations applied to every Postgres + PostgresUser CR this
  # chart renders. Most common use: scope CRs to a specific operator
  # deployment via `postgres-operator/instance: <name>` (matches the
  # operator's POSTGRES_INSTANCE env var). Override per-CR via
  # `databases.<name>.annotations` or
  # `databases.<name>.users.<role>.annotations`.
  annotations: {}
  # When enabled, a Postgres CR is rendered for each entry in `databases`,
  # and a PostgresUser CR for each user under that database. CRs are emitted
  # into the chart's release namespace (i.e. the Keycloak namespace), where
  # the cluster-scoped movetokube/postgres-operator reconciles them.
  #
  # Example:
  #   postgresOperator:
  #     enabled: true
  #     annotations:
  #       postgres.db.movetokube.com/instance: "my-scoped-instance"   # global, optional
  #     databases:
  #       keycloak:
  #         dropOnDelete: false
  #         schemas: []      # optional list
  #         extensions: []   # optional list
  #         annotations: {}  # optional, overrides global on the Postgres CR
  #         users:
  #           keycloak:
  #             privileges: OWNER       # OWNER | READ | WRITE
  #             secretName: keycloak    # operator writes Secret <secretName>-<role>
  #             annotations: {}         # optional, overrides global on the PostgresUser CR
  databases:
    keycloak:
      dropOnDelete: false
      users:
        keycloak:
          privileges: OWNER       # OWNER | READ | WRITE
          secretName: keycloak    # operator writes Secret <secretName>-<role>
