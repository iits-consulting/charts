argo-cd:
  fullnameOverride: "argocd"

  global:
    logging:
      format: "json"
      level: "warn"
    # the /argocd suffix is required for oidc to resolve callback url correct
    # there is an unfixed bug report in argocd: https://github.com/argoproj/argo-cd/issues/23694
    domain: "REPLACE_THIS/argocd"

  controller:
    replicas: 2
    env:
      - name: "TZ"
        value: "Europe/Berlin"
    # resources equivalent to Bitnami setting "medium"
    # see https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    resources:
      requests:
        cpu: 500m
        memory: 1024Mi
        ephemeral-storage: 50Mi
      limits:
        cpu: 750m
        memory: 1536Mi
        ephemeral-storage: 2Gi

  redis-ha:
    enabled: true

  applicationSet:
    replicas: 2

  dex:
    enabled: false

  notifications:
    enabled: false

  repoServer:
    replicas: 2
    env:
      - name: "TZ"
        value: "Europe/Berlin"
    # resources equivalent to Bitnami setting "small"
    # see https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 50Mi
      limits:
        cpu: 750m
        memory: 768Mi
        ephemeral-storage: 2Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  server:
    replicas: 2
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    ingress:
      enabled: true
      hostname: "REPLACE_THIS"
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      path: &ingressPath "/argocd"
    env:
      - name: "TZ"
        value: "Europe/Berlin"

  configs:
    cm:
      # @default -- refer to values.yaml
      oidc.config: |
        name: keycloak
        issuer: $argocd-oidc:oidcURL
        clientID: $argocd-oidc:clientID
        clientSecret: $argocd-oidc:clientSecret
        requestedScopes:
          - openid
          - profile
          - email
        requestedIDTokenClaims:
          groups:
            essential: true

      resource.customizations.ignoreDifferences.argoproj.io_Application: |
        # Ignores .data changes of all secrets with a vaultInjectionChecksum annotation
        jqPathExpressions:
          - '. | select(.metadata.annotations.parametersChecksum) | .spec.source.helm'
          - '. | select(.metadata.annotations.valueFileChecksum) | .spec.source.helm'
      resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
        # Ignores caBundle and template changes of the following resources
        jqPathExpressions:
          - .metadata.annotations.template
          - '.webhooks'
      resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
        jqPathExpressions:
          - .spec.conversion.webhookClientConfig.caBundle
      resource.customizations.ignoreDifferences.admissionregistration.k8s.io_ValidatingWebhookConfiguration: |
        jqPathExpressions:
          - .metadata.annotations.template
          - '.webhooks[]?.clientConfig.caBundle'
          - '.webhooks'
      resource.customizations.ignoreDifferences.cert-manager.io_Certificate: |
        jqPathExpressions:
          - .spec.duration
      resource.customizations.health.networking.k8s.io_Ingress: |
        hs = {}
        hs.status = "Healthy"
        return hs

    rbac:
      # @default -- refer to values.yaml
      policy.csv: |
        g, read-only, role:readonly
        g, full-access, role:admin

        # Grant rights to read and do rollouts + restarts limited to customer apps
        p, role:app-deploy, *, get, app-charts/*, allow
        p, role:app-deploy, applications, sync, app-charts/*, allow
        p, role:app-deploy, *, action/apps/*/restart, app-charts/*, allow
        g, app-deploy, role:app-deploy

        # Grant rights to read and do rollouts + restarts limited to infrastructure apps
        p, role:infra-deploy, *, get, infrastructure-charts/*, allow
        p, role:infra-deploy, applications, sync, infrastructure-charts/*, allow
        p, role:infra-deploy, *, action/apps/*/restart, infrastructure-charts/*, allow
        g, infra-deploy, role:infra-deploy
      scopes: "[client_roles]"

    params:
      server.insecure: true
      server.rootpath: *ingressPath
      server.basehref: *ingressPath

# Please use argocd-secret chart instead if you are using keycloak deployed in the same stage to avoid cyclic dependencies.
#     secret:

# Kyverno Policy Exception
policyException:
  enabled: true
