suite: backup-secure-settings
templates:
  - backup/secure-settings.yaml

release:
  name: elastic-operator

tests:
  - it: should render secure-settings Secret when backup enabled and ESO disabled
    set:
      backup.enabled: true
      backup.repoType: s3
      backup.secureSettings.access_key: "AKIAEXAMPLE"
      backup.secureSettings.secret_key: "secret"
      common.externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: elastic-operator-backup-secure-settings

  - it: should NOT render secure-settings Secret when ESO is enabled
    set:
      backup.enabled: true
      backup.repoType: s3
      backup.secureSettings.access_key: "AKIAEXAMPLE"
      backup.secureSettings.secret_key: "secret"
      common.externalSecret.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should NOT render secure-settings Secret when backup disabled
    set:
      backup.enabled: false
      common.externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0
