suite: backup-secure-settings
templates:
  - backup/secure-settings.yaml

release:
  name: elastic-operator

tests:
  - it: renders an Opaque Secret when backup enabled and ESO disabled
    set:
      backup.enabled: true
      backup.repoType: s3
      backup.secureSettings.access_key: "AKIAEXAMPLE"
      backup.secureSettings.secret_key: "secret"
      common.externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: elastic-operator-backup-secure-settings

  - it: renders an ExternalSecret pulling from vault when backup enabled and ESO enabled
    set:
      backup.enabled: true
      backup.repoType: s3
      backup.path: "stage/elastic-operator/backup"
      backup.secureSettings.access_key: "bucket_access_key"
      common.externalSecret.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: elastic-operator-backup-secure-settings
      - equal:
          path: spec.data[0].secretKey
          value: s3.client.default.access_key
      - equal:
          path: spec.data[0].remoteRef.property
          value: bucket_access_key

  - it: fails when backup enabled with secureSettings in ESO mode but no path
    set:
      backup.enabled: true
      backup.secureSettings.access_key: "bucket_access_key"
      common.externalSecret.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "backup.path is required when common.externalSecret.enabled and backup.enabled are true"

  - it: renders nothing when backup enabled but secureSettings empty (IAM-role case)
    set:
      backup.enabled: true
      common.externalSecret.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when backup disabled
    set:
      backup.enabled: false
      common.externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0
