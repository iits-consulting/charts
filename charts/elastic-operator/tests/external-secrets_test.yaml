suite: external-secrets
templates:
  - eks-stack/external-secrets.yaml

release:
  name: elastic-operator

# In ESO mode each user requires a vault path (the values.yaml defaults are commented out), so supply
# valid paths for all tests. Individual cases override these where the path itself is under test.
set:
  auth.users.custom_filebeat.path: "elastic-operator/filebeat-user"
  auth.users.custom_kibana_guest.path: "elastic-operator/kibana-guest-user"
  auth.users.custom_elastalert.path: "elastic-operator/elastalert-user"

tests:
  - it: renders nothing when ESO disabled
    set:
      common.externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders one generator plus a push and pull per user in ESO mode
    set:
      common.externalSecret.enabled: true
    asserts:
      # 1 Password generator + 3 PushSecret + 3 ExternalSecret for the 3 default users
      - hasDocuments:
          count: 7

  - it: renders exactly one shared Password generator
    set:
      common.externalSecret.enabled: true
    documentSelector:
      path: metadata.name
      value: elastic-operator-password
    asserts:
      - isKind:
          of: Password

  - it: BYO mode pulls only, no generator or push
    set:
      common.externalSecret.enabled: true
      generatePasswords.enabled: false
    asserts:
      # only the 3 pull ExternalSecrets remain
      - hasDocuments:
          count: 3

  - it: per-user property overrides the remote vault key on the pull
    set:
      common.externalSecret.enabled: true
      auth.users.custom_filebeat.property: filebeat_password
    documentSelector:
      path: spec.target.template.data.username
      value: custom_filebeat
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.data[0].remoteRef.property
          value: filebeat_password
