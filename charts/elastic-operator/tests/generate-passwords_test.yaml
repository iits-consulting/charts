suite: generate-passwords
templates:
  - generate-passwords/job.yaml
  - generate-passwords/config.yaml
  - generate-passwords/rbac.yaml

tests:
  - it: should render Job when generatePasswords.enabled
    template: generate-passwords/job.yaml
    set:
      generatePasswords.enabled: true
    asserts:
      - isKind:
          of: Job

  - it: should render ConfigMap when generatePasswords.enabled
    template: generate-passwords/config.yaml
    set:
      generatePasswords.enabled: true
    asserts:
      - isKind:
          of: ConfigMap

  - it: should render RBAC (3 docs) when generatePasswords.enabled
    template: generate-passwords/rbac.yaml
    set:
      generatePasswords.enabled: true
    asserts:
      - hasDocuments:
          count: 3

  - it: should not render Job when generatePasswords disabled
    template: generate-passwords/job.yaml
    set:
      generatePasswords.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render ConfigMap when generatePasswords disabled
    template: generate-passwords/config.yaml
    set:
      generatePasswords.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render RBAC when generatePasswords disabled
    template: generate-passwords/rbac.yaml
    set:
      generatePasswords.enabled: false
    asserts:
      - hasDocuments:
          count: 0
