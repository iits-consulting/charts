{{- $esoEnabled := .Values.common.externalSecret.enabled }}
{{- range $userName, $userDescription := .Values.auth.users }}
{{- /* When ESO is enabled, ExternalSecret materializes the user secret with username/password/roles via template. Skip Helm-rendered secret to avoid ownership conflict. */}}
{{- if not $esoEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-user-{{ kebabcase $userName }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $userName | quote }}
{{- if (not (empty $userDescription.existingPassword)) }}
  password: {{ $userDescription.existingPassword }}
{{- end }}
  roles: {{ join "," $userDescription.roles }}

---
{{- end }}
{{- end }}
