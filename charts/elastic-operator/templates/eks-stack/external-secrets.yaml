{{- if .Values.common.externalSecret.enabled }}
{{- $store := .Values.common.externalSecret.secretStore }}
{{- $refreshInterval := .Values.generatePasswords.refreshInterval }}
{{- $deletionPolicy := .Values.generatePasswords.deletionPolicy }}
{{- $generate := .Values.generatePasswords.enabled }}
{{- $genName := printf "%s-password" .Release.Name }}
{{/*
ESO mode: replaces the bash generate-passwords job and the static basic-auth Secrets.
When generatePasswords.enabled, one Password generator (spec from .Values.generatePasswords.spec)
is shared by every user: per user we push a freshly generated password into vault (IfNotExists,
so a rebuild never rotates it) and pull it back into the basic-auth Secret ECK consumes; same
shape as the non-ESO Secret from eks-stack/elasticsearch-users.yaml (username/roles chart-static),
only the password is now vault-canonical instead of webhook-injected or plain.
When generatePasswords.enabled is false the generator and push are skipped and we only pull —
passwords are then expected to be pre-seeded in vault by some external owner (BYO).
Per user: auth.users.<user>.path sets the vault secret path.
auth.users.<user>.property sets the field within that secret (default "password")
so several users can share one vault secret. property feeds both push and pull so the round-trip
stays symmetric; the k8s secret key stays "password" (filebeat/kibana env refs depend on it).
*/}}
{{/* Password Generator */}}
{{- if and $generate .Values.auth.users }}
{{- $genSpec := .Values.generatePasswords.spec | default (dict "length" 32) }}
{{- include "common.externalSecrets.passwordGenerator" (dict "name" $genName "config" (dict "spec" $genSpec)) }}
{{- end }}
{{/* Pull and Push Secret config */}}
{{- range $userName, $userDescription := .Values.auth.users }}
{{- $userSecret := printf "%s-user-%s" $.Release.Name (kebabcase $userName) }}
{{- $path := required (printf "auth.users.%s.path is required when common.externalSecret.enabled is true" $userName) $userDescription.path }}
{{- $keys := list (dict "name" "password" "remoteKey" ($userDescription.property | default "password")) }}
{{/* Push Secrets */}}
{{- if $generate }}
{{- $pushCfg := dict "path" $path "updatePolicy" "IfNotExists" "secretStores" (list $store) "generatorRef" (dict "apiVersion" "generators.external-secrets.io/v1alpha1" "kind" "Password" "name" $genName) "keys" $keys }}
{{- if $refreshInterval }}
{{- $_ := set $pushCfg "refreshInterval" $refreshInterval }}
{{- end }}
{{- if $deletionPolicy }}
{{- $_ := set $pushCfg "deletionPolicy" $deletionPolicy }}
{{- end }}
{{- include "common.externalSecrets.pushSecret" (dict "name" $userSecret "config" $pushCfg) }}
{{- end }}
{{/* Pull Secrets */}}
{{- $pullCfg := dict "secretStoreRef" $store "path" $path "keys" $keys "template" (dict "type" "kubernetes.io/basic-auth" "data" (dict "username" $userName "password" `{{ .password }}` "roles" (join "," $userDescription.roles))) }}
{{- if $refreshInterval }}
{{- $_ := set $pullCfg "refreshInterval" $refreshInterval }}
{{- end }}
{{- include "common.externalSecrets.externalSecret" (dict "name" $userSecret "config" $pullCfg) }}
{{- end }}
{{- end }}
