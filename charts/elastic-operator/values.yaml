eck-operator:
  securityContext:
    seccompProfile:
      type: RuntimeDefault

ingress:
  kibana:
    enabled: true
    # -- Required, if enabled
    host: "REPLACE_ME"
    path: /kibana
    className: traefik
    labels:
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: "routing-oidc-forward-auth@kubernetescrd"
    tls:
      - hosts:
          - "{{ .Values.ingress.kibana.host }}"

  elasticsearch:
    enabled: false
    # -- Required, if enabled
    host: "REPLACE_ME"
    path: /elasticsearch
    className: traefik
    labels:
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: "routing-oidc-forward-auth@kubernetescrd"
    tls:
      - hosts:
          - "{{ .Values.ingress.elasticsearch.host }}"

  logstash:
    enabled: false
    # -- Required, if enabled
    host: "REPLACE_ME"
    path: /logstash
    className: traefik
    labels:
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: "routing-oidc-forward-auth@kubernetescrd"
    tls:
      - hosts:
          - "{{ .Values.ingress.logstash.host }}"

auth:
  users:
    custom_filebeat:
      # if you provide an existing password, generatePasswords should be disabled
      existingPassword: ""
      roles:
        - custom_filebeat
    custom_kibana_guest:
      # if you provide an existing password, generatePasswords should be disabled
      existingPassword: ""
      roles:
        - viewer
    custom_elastalert:
      # if you provide an existing password, generatePasswords should be disabled
      existingPassword: ""
      roles:
        - custom_elastalert
  roles:
    # see: https://www.elastic.co/guide/en/beats/filebeat/current/feature-roles.html
    custom_filebeat:
      cluster:
        - monitor
        - read_pipeline
        - manage_ilm
        - manage_ingest_pipelines
        - manage_index_templates
      indices:
        - names:
            - "*"
          privileges:
            - monitor
            - create_index
            - create_doc
            - view_index_metadata
            - manage_follow_index
    # see: https://elastalert2.readthedocs.io/en/latest/elasticsearch_security_privileges.html
    custom_elastalert:
      cluster:
        - monitor
      indices:
        - names:
            - "elastalert*"
          privileges:
            - all
        - names:
            - "*"
          privileges:
            - read
            - monitor
            - view_index_metadata
    # -- ECK Logstash user role - extends default permissions
    # Uncomment and customize this role when using Logstash to grant additional permissions
    # See: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-logstash-configuration.html#k8s-logstash-es
    # eck_logstash_user_role:
    #   cluster:
    #     - monitor
    #     - manage_ilm
    #     - read_ilm
    #     - ...
    #   indices:
    #     - names:
    #         - "logstash*"
    #         - "ecs-logstash*"
    #         - "..."
    #         # Add your application-specific index patterns
    #         # - "messenger*"
    #         # - "keycloak*"
    #       privileges:
    #         - manage
    #         - write
    #         - create_index
    #         - read
    #         - view_index_metadata
    #         - create_doc
    #         - index

elasticsearch:
  enabled: true
  volumeSize: 200G
  version: "{{ .Chart.AppVersion }}"
  nodeCount: 2
  config:
    node:
      store:
        allow_mmap: false
    http:
      max_header_size: 16kb
    cluster:
      max_shards_per_node: 30000
  extraSecureSettings: [ ]
  javaOpts: ""
  resources:
    requests:
      cpu: "200m"
      memory: "8G"
    limits:
      memory: "8G"
  podTemplateSpec:
    containers:
      - name: elasticsearch
        resources:
          requests:
            cpu: "{{ .Values.elasticsearch.resources.requests.cpu }}"
            memory: "{{ .Values.elasticsearch.resources.requests.memory }}"
          limits:
            memory: "{{ .Values.elasticsearch.resources.limits.memory }}"
        env:
          - name: ES_JAVA_OPTS
            value: "{{ .Values.elasticsearch.javaOpts }}"

filebeat:
  enabled: true
  version: "{{ .Chart.AppVersion }}"
  # -- Enable Logstash output instead of direct Elasticsearch output
  # When enabled, Filebeat sends logs to Logstash instead of Elasticsearch
  # Note: elasticsearchRef and kibanaRef are automatically removed when this is true
  useLogstashOutput: false
  # -- Logstash output configuration (only used when useLogstashOutput is true)
  # If not specified, defaults to {{ .Release.Name }}-ls-beats:5044
  logstashOutput: {}
  #  hosts: ["{{ .Release.Name }}-ls-beats:5044"]
  #  # Optional additional Logstash output settings
  #  # loadbalance: true
  #  # worker: 2
  autodiscover:
    providers:
      - type: kubernetes
        node: ${NODE_NAME}
        hints:
          default_config:
            id: kubernetes-container-logs-${data.kubernetes.pod.name}-${data.kubernetes.container.id}
            parsers:
            - container: {}
            paths:
            - /var/log/containers/*${data.kubernetes.container.id}.log
            prospector:
              scanner:
                fingerprint.enabled: true
                symlinks: true
            type: filestream
          enabled: true
  # default processors
  processors:
    - add_kubernetes_metadata: { }
    - decode_json_fields:
        when:
          has_fields: [ "message" ]
        fields: [ "message" ]
        target: ""
        overwrite_keys: true
        add_error_key: true
    - decode_json_fields:
        when:
          has_fields: [ "msg" ]
        fields: [ "msg" ]
        target: ""
        overwrite_keys: true
        add_error_key: true
    - add_labels:
        labels:
          stage: ${STAGE:dev}
    - drop_event:
        when:
          or:
            - equals:
                kubernetes.labels:
                  common_k8s_elastic_co/type: "elasticsearch"
            - equals:
                kubernetes.labels:
                  common_k8s_elastic_co/type: "beat"
            - equals:
                kubernetes.labels:
                  common_k8s_elastic_co/type: "kibana"
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "grafana"
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "prometheus-stack-prometheus-operator"
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "prometheus"
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "kube-state-metrics"
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "argo-cd"
            - contains:
                kubernetes.labels:
                  app_kubernetes_io/name: "traefik"
                error: "read: connection reset by peer" # Traefik error log because of TCP health checks
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "gatekeeper"
                msg: "authentication session not found in request"
            - equals:
                kubernetes.labels:
                  app_kubernetes_io/name: "vault-secrets-webhook"
            - equals:
                kubernetes.namespace: "kube-system"
  # add additional processors without overwriting the default ones  (they will get appended)
  extraProcessors: [ ]
  # default indices
  indices:
    - index: "%{[kubernetes.namespace]:not-defined}-%{[kubernetes.labels.app_kubernetes_io/name]}-%{[agent.version]}-%{+yyyy.MM}"
      when:
        has_fields: [ "kubernetes.labels.app_kubernetes_io/name" ]
    - index: "%{[kubernetes.namespace]:not-defined}-%{[kubernetes.labels.app]}-%{[agent.version]}-%{+yyyy.MM}"
      when:
        has_fields: [ "kubernetes.labels.app" ]
    - index: "%{[kubernetes.namespace]:not-defined}-not-defined-%{[agent.version]}-%{+yyyy.MM}"
  # add additional indices without overwriting the default ones (they will get prepended)
  extraIndices: [ ]
  resources:
    requests:
      cpu: "100m"
      memory: "100M"
    limits:
      memory: "500M"
  readinessProbe:
    failureThreshold: 50
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 10
  env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: spec.nodeName
    - name: ELASTICSEARCH_USERNAME
      valueFrom:
        secretKeyRef:
          key: username
          name: "{{ .Release.Name }}-user-custom-filebeat"
    - name: ELASTICSEARCH_PASSWORD
      valueFrom:
        secretKeyRef:
          key: password
          name: "{{ .Release.Name }}-user-custom-filebeat"
  # -- example: Setup stage name
  # - name: STAGE
  #   value: "REPLACE_ME"
  extraEnv: [ ]
  volumes:
    # for otc: https://docs.otc.t-systems.com/cloud-container-engine/umn/nodes/node_o_and_m/differences_between_cce_node_mountpath_configurations_and_community_native_configurations.html
    - name: varlibcontainerdcontainerlogs
      hostPath:
        path: /var/lib/containerd/container_logs
    # for kubernetes native, like /var/log/pods or /var/log/containers
    - name: varlog
      hostPath:
        path: /var/log
        type: ''
  extraVolumes: [ ]
  volumeMounts:
    - name: varlibcontainerdcontainerlogs
      mountPath: /var/lib/containerd/container_logs
      readOnly: true
    - mountPath: /var/log
      name: varlog
      readOnly: true
  extraVolumeMounts: [ ]
  tolerations: [ ]

kibana:
  enabled: true
  version: "{{ .Chart.AppVersion }}"
  count: 2

  resources:
    requests:
      cpu: "100m"
      memory: "1G"
    limits:
      memory: "1G"

  config:
    server:
      basePath: "{{ .Values.ingress.kibana.path }}"
      publicBaseUrl: "https://{{ .Values.ingress.kibana.host }}{{ .Values.ingress.kibana.path }}"
      rewriteBasePath: true

    monitoring:
      ui:
        enabled: true
        container:
          elasticsearch:
            enabled: true

    xpack:
      reporting:
        csv:
          maxSizeBytes: 1048576000
        queue:
          timeout: 1800000

      security:
        authc:
          providers: # allow login as anonymous user into kibana, using anonymous user of elasticsearch
            anonymous:
              anonymous1:
                order: 0
                credentials:
                  username: '${ANONYMOUS_USERNAME}'
                  password: '${ANONYMOUS_PASSWORD}'
            basic:
              basic1:
                order: 1

  podTemplateSpec:
    securityContext:
      seccompProfile:
        type: RuntimeDefault

    containers:
      - name: kibana
        resources:
          requests:
            cpu: "{{ .Values.kibana.resources.requests.cpu }}"
            memory: "{{ .Values.kibana.resources.requests.memory }}"
          limits:
            memory: "{{ .Values.kibana.resources.limits.memory }}"
        env:
          - name: ANONYMOUS_USERNAME
            valueFrom:
              secretKeyRef:
                key: username
                name: "{{ .Release.Name }}-user-custom-kibana-guest"
          - name: ANONYMOUS_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: "{{ .Release.Name }}-user-custom-kibana-guest"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

    initContainers:
      - name: elastic-internal-init
        resources:
          requests:
            cpu: "250m"
            memory: "50Mi"
          limits:
            memory: "50Mi"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

# -- Logstash configuration using ECK Logstash CRD
logstash:
  # -- Enable Logstash deployment via ECK CRD
  enabled: false
  # -- Logstash version to deploy
  version: "{{ .Chart.AppVersion }}"
  # -- Number of Logstash replicas
  count: 1
  
  # -- Elasticsearch cluster reference for Logstash
  # This automatically injects ECK_ES_HOSTS, ECK_ES_USER, ECK_ES_PASSWORD, and ECK_ES_SSL_CERTIFICATE_AUTHORITY
  elasticsearchRef:
    clusterName: "eck"
    name: "{{ .Release.Name }}"
  
  # -- Logstash configuration
  # See: https://www.elastic.co/guide/en/logstash/current/logstash-settings-file.html
  config:
    pipeline.batch.size: 125
    http.host: 0.0.0.0
    xpack.monitoring.enabled: false
  
  # -- JVM options for Logstash
  javaOpts: "-Xms1g -Xmx1g"
  
  # -- Resource limits and requests for Logstash pods
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  
  # -- Logstash pipeline configuration
  # You can define pipelines inline or reference a Secret via pipelinesRef
  # See: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-logstash-configuration.html
  pipelines:
    - pipeline.id: main
      config.string: |
        input {
          beats {
            port => 5044
            ssl_enabled => false
          }
        }
        output {
          elasticsearch {
            hosts => [ "${ECK_ES_HOSTS}" ]
            user => "${ECK_ES_USER}"
            password => "${ECK_ES_PASSWORD}"
            ssl_certificate_authorities => "${ECK_ES_SSL_CERTIFICATE_AUTHORITY}"
          }
        }
  
  # -- Alternative: Reference a Secret containing pipelines.yml
  # Uncomment to use Secret-based configuration instead of inline pipelines
  # pipelinesRef:
  #   secretName: logstash-pipeline
  
  # -- Service configuration for Logstash
  # Exposes ports for Beats input and Logstash API
  services:
    - name: beats
      service:
        spec:
          ports:
            - port: 5044
              name: "filebeat"
              protocol: TCP
            - port: 9600
              name: "api"
              protocol: TCP
  
  # -- Pod template spec for additional customization
  # Leave empty to use default configuration with javaOpts and resources
  podTemplateSpec: {}

indexPatternInit:
  image:
    repository: docker.io/curlimages/curl
    tag: 8.12.1
    userId: 100
  tolerations: [ ]
  nodeSelector: { }
  indices:
    admin:
      timestampField: "@timestamp"
    argocd:
      timestampField: "@timestamp"
    auth:
      timestampField: "@timestamp"
    cert-manager:
      timestampField: "@timestamp"
    kyverno:
      timestampField: "@timestamp"
    monitoring:
      timestampField: "@timestamp"
    routing:
      timestampField: "@timestamp"
    vault:
      timestampField: "@timestamp"
    not-defined:
      timestampField: "@timestamp"

ilm:
  image:
    repository: docker.io/curlimages/curl
    tag: 8.13.0
    userId: 100
  tolerations: [ ]
  nodeSelector: { }
  policies:
    long:
      #business apps and security relevant logs
      indexPatterns: [ "auth*", "vault*" ]
      coldAfter: 32d
      deleteAfter: 365d
    medium:
      indexPatterns: [ "cert-manager*", "routing*", "not-defined*" ]
      coldAfter: 32d
      deleteAfter: 90d
    short:
      indexPatterns: [ "admin*", "argocd*", "kyverno*", "monitoring*" ]
      coldAfter: 2d
      deleteAfter: 14d

generatePasswords:
  enabled: true
  image:
    repository: docker.io/bitnamilegacy/kubectl
    tag: 1.32.4
    userId: 100
  tolerations: [ ]
  nodeSelector: { }
  secrets:
    - name: "{{ .Release.Name }}-user-custom-kibana-guest"
      key: password
      #length: 32
    - name: "{{ .Release.Name }}-user-custom-filebeat"
      key: password
      #length: 32
    - name: "{{ .Release.Name }}-user-custom-elastalert"
      key: password
      #length: 32

backup:
  enabled: false
  image:
    repository: docker.io/curlimages/curl
    tag: 8.13.0
    userId: 100
  tolerations: [ ]
  nodeSelector: { }
  repoName: "elastic-backups"
  # -- for Azure blob storage use "azure"
  repoType: "s3"

  secureSettings:
  # # S3 compatible / OTC
  # # -- Required
  # access_key: "REPLACE_ME"
  # # -- Required
  # secret_key: "REPLACE_ME"

  # # Azure blob storage
  # # -- Required
  # account: "REPLACE_ME"
  # # -- Required (alternative for key)
  # sas_token: "REPLACE_ME"
  # # -- Required (alternative for sas_token)
  # key: "REPLACE_ME"

  repositorySettings:
  # # S3 compatible / OTC
  # # -- Required
  # endpoint: "https://obs.eu-de.otc.t-systems.com"
  # # -- Required
  # bucket: "REPLACE_ME"
  # # To set the S3 client region use elasticsearch.config e.g.: s3.client.default.region: "eu-de"

  # # Azure blob storage
  # container: "REPLACE_ME"

  policy:
    name: "nightly-backup"
    schedule: "0 0 0 * * ?"
    # indices can also be set to a list such as [ "data-*", "important" ]
    indices: [ "*" ]
    retention:
      expireAfter: "15d"
      minCount: 5
      maxCount: 15

policyException:
  enabled: true
