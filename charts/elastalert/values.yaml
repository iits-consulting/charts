elastalert2:
  elasticsearch:
    # -- needs to be in the same namespaces as elastic stack if used like this
    host: elasticsearch-master
  # Mounts SLACK_WEBHOOK_URL from the ESO-created secret. optional=true keeps the pod
  # running when ESO is disabled and the secret does not exist.
  # Override secretKeyRef.name to match common.externalSecret.pull.secrets key if changed.
  optEnv:
    - name: SLACK_WEBHOOK_URL
      valueFrom:
        secretKeyRef:
          name: elastalert-slack-webhook
          key: slack_webhook_url
          optional: true
  secretRulesName: elastalert-custom-rules
  secretRulesList:
    - argoCD
    - botKube
    - vaultInjection
    - kyverno
    - kafkaTopicCreatedNotification
  # -- Exemplary Configuration for elastic-operator:
  # elasticsearch:
  #   # needs to be in the same namespaces as elastic stack if used like this
  #   host: elastic-operator-es-http
  #   useSsl: "True"
  #   caCerts: "/certs/tls.crt"
  #   certsVolumes:
  #     - name: elasticsearch-certs
  #       secret:
  #         defaultMode: 420
  #         secretName: elastic-operator-es-http-certs-public
  #   certsVolumeMounts:
  #     - name: elasticsearch-certs
  #       mountPath: /certs
  #       readOnly: true
  #   credentialsSecret: elastic-operator-user-custom-elastalert
  #   credentialsSecretUsernameKey: username
  #   credentialsSecretPasswordKey: password
customRules:
  slack:
    # -- Slack webhook URL injected directly. Used when common.externalSecret.enabled=false.
    # For ArgoCD vault plugin: parameters: customRules.slack.webhookUrl: "${vault:...}"
    webhookUrl:
  # Alert rules. Each entry is rendered as a separate elastalert2 rule file.
  # The global slack.webhookUrl (or ${SLACK_WEBHOOK_URL} in ESO mode) is injected into
  # every rule automatically. Individual rules can override this by setting their own
  # slack_webhook_url, which takes precedence over the global value:
  #   alerting:
  #     myRule:
  #       slack_webhook_url: "https://hooks.slack.com/services/other-channel"
  #       ...
  alerting:
    argoCD:
      name: ArgoCD Error
      index: argocd*
      alert_text_args: [ "@timestamp" ]
      type: any
      query_key: message
      alert_text_type: aggregation_summary_only
      realert:
        minutes: 30
      exponential_realert:
        days: 3
      fields:
        - "message"
      alert:
        - "slack"
      filter:
        - query_string:
            query: "level: \"*error*\" OR message: \"*level=error*\""
      slack_title: ArgoCD Error
      slack_alert_fields:
        - title: Stage
          value: labels.stage
        - title: Component
          value: kubernetes.labels.app_kubernetes_io/component
        - title: Pod
          value: kubernetes.pod.name
        - title: Message
          value: message
    botKube:
      name: Botkube Error
      index: botkube*
      timestamp_field: TimeStamp
      type: any
      query_key: message
      alert_text_type: aggregation_summary_only
      realert:
        minutes: 30
      exponential_realert:
        days: 3
      fields:
        - "message"
      alert:
        - "slack"
      filter:
        - query_string:
            query: "Type:\"error\""
      slack_title: Botkube Error
      slack_alert_fields:
        - title: Cluster
          value: Cluster
        - title: Title
          value: Title
        - title: Messages
          value: Messages[0]
        - title: TimeStamp
          value: TimeStamp
        - title: Kind
          value: Kind
        - title: Name
          value: Name
        - title: Reason
          value: Reason
    vaultInjection:
      name: Vault Injection Error
      index: vault*
      alert_text_args: ["@time"]
      type: any
      query_key: msg
      alert_text_type: aggregation_summary_only
      realert:
        minutes: 30
      exponential_realert:
        days: 3
      fields:
        - "msg"
      alert:
        - "slack"
      filter:
        - eql: any where message like~ "\\[ERROR\\]"
      slack_title: Vault Injection Error
      slack_alert_fields:
        - title: Stage
          value: labels.stage
        - title: Msg
          value: msg
        - title: Name
          value: name
        - title: Error
          value: error
    kyverno:
      name: Kyverno Error
      index: kyverno*
      alert_text_args: ["@timestamp"]
      type: any
      query_key: message
      alert_text_type: aggregation_summary_only
      realert:
        minutes: 30
      exponential_realert:
        days: 3
      fields:
        - "message"
      alert:
        - "slack"
      filter:
        - query_string:
            query: "message: \"validation failed\" OR message: \"policy validation errors\""
      slack_title: Kyverno Error
      slack_alert_fields:
        - title: Stage
          value: labels.stage
        - title: Component
          value: kubernetes.labels.app_kubernetes_io/component
        - title: Pod
          value: kubernetes.pod.name
        - title: Message
          value: message
    kafkaTopicCreatedNotification:
        name: Kafka Topic Notification
        index: kafka*
        alert_text_args: ["@timestamp"]
        type: any
        query_key: message
        alert_text_type: aggregation_summary_only
        realert:
          minutes: 30
        exponential_realert:
          days: 3
        fields:
          - "message"
        alert:
          - "slack"
        filter:
        - query_string:
              query: "message: \"Creating topic\" AND \"with configuration\" AND \"and initial partition assignment\""
        slack:
        slack_title: Kafka Topic Notification
        slack_alert_fields:
        - title: Stage
          value: labels.stage
        - title: App
          value: kubernetes.labels.app
        - title: Pod
          value: kubernetes.pod.name
        - title: Message
          value: message
        - title: upstream_addr
          value: upstream_addr
        - title: Request Id
          value: requestId
          short: true
        - title: Stacktrace
          value: stacktrace
        - title: User
          value: user

# Opt-in ESO integration via the common sub-chart.
# When enabled, an ExternalSecret pulls the Slack webhook URL from the secret store
# and writes it into the elastalert-slack-webhook K8s Secret as key "slack_webhook_url".
# The pod then reads it as SLACK_WEBHOOK_URL via elastalert2.optEnv above.
# Must also set common.externalSecret.pull.enabled=true and configure the secrets path.
#
# remoteKey is optional: if omitted it defaults to the key name ("slack_webhook_url").
# Set it explicitly when the key in your secret store has a different name, e.g.:
#   keys:
#     - name: slack_webhook_url
#       remoteKey: different_key_in_vault
common:
  externalSecret:
    enabled: false
    secretStore:
      kind: ClusterSecretStore
      name: vault
    pull:
      enabled: false
      secrets:
        elastalert-slack-webhook:
          path: ""  # -- Required: path to the secret in your store, e.g. "context/data/stage/alerting"
          keys:
            - name: slack_webhook_url
